# Render Blueprint — deploy backend + frontend (free tier)
#
# ⚠️ Free tier KHÔNG có persistent disk → data trong /tmp ephemeral
#    (mất khi restart). Đủ cho pilot test, sau upgrade lên paid để giữ data.
#
# Free tier: 750h/tháng tổng, sleep 15ph idle, cold start ~30s.

services:
  # === BACKEND: FastAPI ===
  - type: web
    name: tiktok-cdt-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATA_ROOT
        value: /tmp/data
      - key: CORS_ORIGINS
        value: https://tiktok-cdt.onrender.com,http://localhost:3000
      - key: GROQ_API_KEY
        sync: false   # set thủ công khi Apply
    healthCheckPath: /health

  # === FRONTEND: Next.js ===
  - type: web
    name: tiktok-cdt
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: BACKEND_URL
        value: https://tiktok-cdt-backend.onrender.com
